name: Atualizar Changelog Automaticamente

on:
  push:
    branches:
      - main

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerar CHANGELOG.md
        uses: github-actions-x/changelog-generator@v1
        with:
          myToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Commitar alteracao do Changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: atualiza CHANGELOG.md [skip ci]"
          file_pattern: CHANGELOG.md